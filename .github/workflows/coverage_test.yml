name: Run tests and upload coverage

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'changelogs/**'
      - 'dashboard/**'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: astrbot
          POSTGRES_PASSWORD: astrbot
          POSTGRES_DB: astrbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astrbot -d astrbot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install --editable .

      - name: Run tests
        run: |
          mkdir -p data/plugins
          mkdir -p data/config
          mkdir -p data/temp
          export TESTING=true
          export ZHIPU_API_KEY=${{ secrets.OPENAI_API_KEY }}
          export TEST_POSTGRES_URL=postgresql+asyncpg://astrbot:astrbot@127.0.0.1:5432/astrbot_test
          uv run pytest --cov=astrbot -v -o log_cli=true -o log_level=DEBUG

      - name: Upload results to Codecov
        if: github.repository == 'AstrBotDevs/AstrBot'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
